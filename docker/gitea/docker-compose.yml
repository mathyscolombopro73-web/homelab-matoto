# Gitea — Forge Git locale (alternative auto-hébergée à GitHub)
# URL : http://10.20.0.20:3003
# Première connexion : l'assistant d'installation se lance automatiquement

services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3003:3000"   # Interface web
      - "2222:22"     # SSH Git (port alternatif pour éviter le conflit avec SSH système)
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - TZ=Europe/Paris
      # Configuration Gitea (peut aussi être faite via l'interface web au premier démarrage)
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__DOMAIN=10.20.0.20
      - GITEA__server__SSH_DOMAIN=10.20.0.20
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://10.20.0.20:3003
      - GITEA__server__SSH_PORT=2222
      - GITEA__service__DISABLE_REGISTRATION=false  # Mettre à true après création du compte admin

volumes:
  gitea_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/homelab/gitea
