# Nginx Proxy Manager — Reverse proxy avec interface web
# Interface admin : http://10.20.0.20:81
# Identifiants par défaut : admin@example.com / changeme
# CHANGER ces identifiants immédiatement après la première connexion

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP (trafic web)
      - "443:443"   # HTTPS (trafic web sécurisé)
      - "81:81"     # Interface d'administration web
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    environment:
      - TZ=Europe/Paris
      # Désactiver IPv6 si non utilisé
      - DISABLE_IPV6=true

volumes:
  npm_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/homelab/nginx-proxy-manager
  npm_letsencrypt:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/homelab/nginx-proxy-manager/letsencrypt
