# Grafana + Prometheus — Monitoring du homelab
# Grafana  : http://10.20.0.20:3002  (admin / CHANGE_ME)
# Prometheus: http://10.20.0.20:9090

services:
  # Collecte de métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Fichier de configuration Prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Données de métriques persistantes
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    environment:
      - TZ=Europe/Paris

  # Visualisation des métriques
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - TZ=Europe/Paris
      - GF_SECURITY_ADMIN_USER=admin
      # Changer ce mot de passe — NE PAS utiliser en production tel quel
      - GF_SECURITY_ADMIN_PASSWORD=CHANGE_ME
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://10.20.0.20:3002
    depends_on:
      - prometheus

  # Agent de métriques système sur srv-02
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host

volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/homelab/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/homelab/grafana
